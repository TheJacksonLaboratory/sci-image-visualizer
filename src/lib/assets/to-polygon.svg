<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Convert-to-polygon tool icon: endpoints joined by straight segments through a vertex. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44" fill="#000000">
  <!-- straight-segment path through the vertices -->
  <polyline points="7,34 22,12 37,10" fill="none" stroke="#000000" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- vertices -->
  <rect x="4" y="31" width="6" height="6" rx="1"/>
  <rect x="19" y="9" width="6" height="6" rx="1"/>
  <rect x="34" y="7" width="6" height="6" rx="1"/>
</svg>
