# Builds the browser example (examples/browser-image) and publishes it to GitHub
# Pages, so the running demo is viewable at
#   https://thejacksonlaboratory.github.io/sci-image-visualizer/
#
# Requires: Settings → Pages → Source = "GitHub Actions". For an internal/private
# repo, Pages is only served with GitHub Enterprise Cloud (access-controlled);
# otherwise it publishes once the repo is public.
name: Deploy example to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'examples/browser-image/**'
      - 'src/**'
      - '.github/workflows/pages.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Public Pages serves under /sci-image-visualizer/ — Vite must build with this
      # base or every absolute /assets URL 404s at the subpath (white page). The
      # smoke test reads it too, to preview + probe at the same subpath.
      PAGES_BASE: /sci-image-visualizer/
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # pull the real sample-image bytes, not LFS pointers
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build # ng-packagr → ./dist (the example aliases to it)
      - run: npm run build:example
      - run: npx playwright install --with-deps chromium
      - run: node examples/browser-image/smoke.mjs # fails on any runtime error / white page
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/browser-image/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
